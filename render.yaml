services:
  # ── Backend (Docker) ──────────────────────────────────────────
  - type: web
    name: wealth-planner-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # Render will prompt you to enter this secret
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false          # Set to https://wealth-planner-frontend.onrender.com after first deploy
      - key: LOG_LEVEL
        value: INFO
      - key: PORT
        value: 8000

  # ── Frontend (Node.js / Next.js) ──────────────────────────────
  - type: web
    name: wealth-planner-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false          # Set to https://wealth-planner-backend.onrender.com after first deploy
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
